<!DOCTYPE html>
<html>
<head>
<title>Energy Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

#login{
margin-top:80px;
}

input{
padding:10px;
border-radius:5px;
border:none;
width:200px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#00c6ff;
color:white;
cursor:pointer;
}

.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
width:160px;
margin:10px;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:10px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.value{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

.filter{
margin-top:20px;
}

</style>

</head>

<body>

<h2>⚡ Energy Monitoring Dashboard</h2>

<div id="login">

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<div class="dashboard">

<div class="card">Voltage<div id="voltage" class="value">0</div></div>
<div class="card">Current<div id="current" class="value">0</div></div>
<div class="card">Power<div id="power" class="value">0</div></div>
<div class="card">Energy<div id="energy" class="value">0</div></div>
<div class="card">Frequency<div id="frequency" class="value">0</div></div>
<div class="card">PF<div id="pf" class="value">0</div></div>

</div>

<div class="filter">

<h3>History Chart</h3>

<input type="date" id="date">

<button onclick="loadHistory()">Load Data</button>

</div>

<canvas id="chart" width="900" height="400"></canvas>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
  authDomain: "rohmadafi.firebaseapp.com",
  databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rohmadafi",
  storageBucket: "rohmadafi.firebasestorage.app",
  messagingSenderId: "285538177933",
  appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let chart;

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

loadLive();

})
.catch(err=>alert(err.message));

}

function animateValue(id,val){

let el=document.getElementById(id);

el.style.transform="scale(1.2)";

setTimeout(()=>{

el.innerText=val;
el.style.transform="scale(1)";

},150);

}

function loadLive(){

db.ref("monitoring/live").on("value",(snap)=>{

let d=snap.val();

animateValue("voltage",d.voltage);
animateValue("current",d.current);
animateValue("power",d.power);
animateValue("energy",d.energy);
animateValue("frequency",d.frequency);
animateValue("pf",d.pf);

});

}

function loadHistory(){

let date=document.getElementById("date").value;

let labels=[];
let power=[];

db.ref("monitoring/history").once("value",(snap)=>{

snap.forEach(child=>{

let data=child.val();

if(data.date==date){

labels.push(data.time);
power.push(data.power);

}

});

drawChart(labels,power);

});

}

function drawChart(labels,data){

if(chart) chart.destroy();

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Power (W)',
data:data,
borderWidth:2,
tension:0.4
}]
},
options:{
responsive:true
}
});

}

</script>

</body>
</html>
