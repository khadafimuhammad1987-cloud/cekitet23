<!DOCTYPE html>
<html>
<head>
<title>Energy Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
margin:0;
}

h2{margin-top:20px;}

#login{margin-top:80px;}

input{
padding:10px;
border-radius:5px;
border:none;
width:200px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#00c6ff;
color:white;
cursor:pointer;
}

.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
width:170px;
margin:10px;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:10px;
backdrop-filter:blur(10px);
}

.value{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>⚡ Energy Monitoring Dashboard</h2>

<div id="login">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="dashboard">

<div class="card">Voltage<div id="voltage" class="value">0</div></div>
<div class="card">Current<div id="current" class="value">0</div></div>
<div class="card">Power<div id="power" class="value">0</div></div>
<div class="card">Energy<div id="energy" class="value">0</div></div>
<div class="card">Frequency<div id="frequency" class="value">0</div></div>
<div class="card">PF<div id="pf" class="value">0</div></div>
<div class="card">Biaya<div id="cost" class="value">Rp0</div></div>

<div class="card">
Power Limit
<input id="limit" placeholder="Watt">
<button onclick="setLimit()">Set</button>
</div>

<div class="card">
Energi 24 Jam
<div id="energy24" class="value">0</div>
</div>

</div>

<br>
<button onclick="exportCSV()">Export CSV</button>

<canvas id="chart" width="900" height="400"></canvas>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

const tarif = 415;

let chart;
let historyData=[];
let powerLimit=localStorage.getItem("limit")||0;

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

loadLive();
loadChart();

})
.catch(err=>alert(err.message));

}

function setValue(id,val){
if(val==null) val=0;
document.getElementById(id).innerText=Number(val).toFixed(2);
}

function loadLive(){

db.ref("monitoring/live").on("value",(snap)=>{

let d=snap.val();
if(!d) return;

setValue("voltage",d.voltage);
setValue("current",d.current);
setValue("power",d.power);
setValue("energy",d.energy);
setValue("frequency",d.frequency);
setValue("pf",d.pf);

let biaya=d.energy*tarif;
document.getElementById("cost").innerText="Rp "+biaya.toLocaleString();

if(powerLimit>0 && d.power>powerLimit){
document.body.style.background="red";
}else{
document.body.style.background="linear-gradient(135deg,#1e3c72,#2a5298)";
}

});

}

function loadChart(){

db.ref("monitoring/history")
.limitToLast(200)
.on("value",(snap)=>{

let labels=[];
let power=[];

historyData=[];

snap.forEach(child=>{

let d=child.val();

let t=new Date(d.timestamp*1000);

labels.push(t.toLocaleTimeString());
power.push(Number(d.power));

historyData.push({
time:t,
power:d.power
});

});

drawChart(labels,power);
energyLast24Hours();

});

}

function drawChart(labels,data){

if(chart) chart.destroy();

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Power (W)',
data:data,
borderColor:'#00ffcc',
backgroundColor:'rgba(0,255,200,0.2)',
fill:true
}]
}
});

}

function energyLast24Hours(){

let now=Date.now();
let oneDay=24*60*60*1000;
let total=0;

historyData.forEach(d=>{

let t=d.time.getTime();

if(now-t<=oneDay){
total+=Number(d.power);
}

});

let kwh=(total/1000).toFixed(2);

document.getElementById("energy24").innerText=kwh+" kWh";

}

function setLimit(){

powerLimit=document.getElementById("limit").value;

localStorage.setItem("limit",powerLimit);

alert("Power limit saved");

}

function exportCSV(){

let csv="Time,Power\n";

historyData.forEach(d=>{
csv+=d.time+","+d.power+"\n";
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="energy_data.csv";
a.click();

}

</script>

</body>
</html>
