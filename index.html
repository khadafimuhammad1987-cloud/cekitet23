<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PLN Energy Monitor</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f4f9;
}

.header{
background:#1976d2;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.loginBox{
width:300px;
margin:120px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

.loginBox input{
width:90%;
padding:10px;
margin:10px 0;
}

.loginBox button{
width:100%;
padding:10px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
}

.dashboard{
display:none;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.value{
font-size:26px;
font-weight:bold;
color:#1976d2;
}

.section{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#1976d2;
color:white;
padding:8px;
}

table td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
padding:10px 15px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="header">
⚡ PLN Energy Monitoring
</div>

<div id="loginPage" class="loginBox">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginStatus"></p>

</div>

<div id="dashboard" class="dashboard">

<div class="cards">

<div class="card">
Voltage
<div class="value" id="voltage">0 V</div>
</div>

<div class="card">
Current
<div class="value" id="current">0 A</div>
</div>

<div class="card">
Power
<div class="value" id="power">0 W</div>
</div>

<div class="card">
Energy
<div class="value" id="energy">0 kWh</div>
</div>

</div>

<div class="section">

<h3>Grafik Daya</h3>

<canvas id="powerChart"></canvas>

</div>

<div class="section">

<h3>Riwayat Konsumsi</h3>

<table>

<tr>
<th>Waktu</th>
<th>Voltage</th>
<th>Current</th>
<th>Power</th>
<th>Energy</th>
</tr>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"

};

firebase.initializeApp(firebaseConfig);

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>{
document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"
loadData()
})

.catch((error)=>{
document.getElementById("loginStatus").innerText="Login gagal"
})

}

let chart=new Chart(
document.getElementById("powerChart"),
{
type:'line',
data:{
labels:[],
datasets:[{
label:'Power',
data:[],
borderColor:'#1976d2',
backgroundColor:'rgba(25,118,210,0.2)',
fill:true
}]
}
})

function loadData(){

firebase.database().ref("monitoring/live").on("value",(snap)=>{

let d=snap.val()

if(d){

document.getElementById("voltage").innerText=d.voltage+" V"
document.getElementById("current").innerText=d.current+" A"
document.getElementById("power").innerText=d.power+" W"
document.getElementById("energy").innerText=d.energy+" kWh"

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(d.power)

if(chart.data.labels.length>20){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

}

})

firebase.database().ref("monitoring/history")
.limitToLast(10)
.on("value",(snap)=>{

let table=""

snap.forEach((child)=>{

let d=child.val()

table+=`
<tr>
<td>${new Date(d.timestamp).toLocaleString()}</td>
<td>${d.voltage}</td>
<td>${d.current}</td>
<td>${d.power}</td>
<td>${d.energy}</td>
</tr>
`

})

document.getElementById("history").innerHTML=table

})

}

</script>

</body>

</html>
