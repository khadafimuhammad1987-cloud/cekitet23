<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Monitoring KWH</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Login Screen -->
<div id="login-screen" class="flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Login Dashboard</h2>
    <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
    <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
    <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Login</button>
    <p id="login-error" class="text-red-500 mt-2 text-sm"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden p-6">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Dashboard Listrik</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
  </div>

  <!-- Pilih Tanggal -->
  <div class="mb-6 flex gap-4 items-center">
    <label>Pilih Tanggal:</label>
    <input type="date" id="datePicker" class="p-2 border rounded">
    <button onclick="loadHistoricalData()" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">Tampilkan Histori</button>
  </div>

  <!-- Sensor Widgets -->
  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Voltage (V)</h3>
      <p id="voltage">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Current (A)</h3>
      <p id="current">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Power (W)</h3>
      <p id="power">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Frequency (Hz)</h3>
      <p id="frequency">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Energy Total (kWh)</h3>
      <p id="energy_total">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Energy Used (kWh)</h3>
      <p id="energy_used">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Power Factor (PF)</h3>
      <p id="pf">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Time</h3>
      <p id="time">0</p>
    </div>
  </div>

  <!-- Biaya -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Biaya per Jam (Rp)</h3>
      <p id="biaya_per_jam">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Biaya per Hari (Rp)</h3>
      <p id="biaya_per_hari">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Biaya per Bulan (Rp)</h3>
      <p id="biaya_per_bulan">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow text-center">
      <h3 class="font-bold">Total Biaya (Rp)</h3>
      <p id="biaya_total">0</p>
    </div>
  </div>

  <!-- Grafik KWH -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <canvas id="kwhChart"></canvas>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
  authDomain: "rohmadafi.firebaseapp.com",
  databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rohmadafi",
  storageBucket: "rohmadafi.firebasestorage.app",
  messagingSenderId: "285538177933",
  appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Login
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  auth.signInWithEmailAndPassword(email,password)
    .then(()=>{document.getElementById('login-screen').classList.add('hidden');document.getElementById('dashboard').classList.remove('hidden');loadRealtimeData();})
    .catch(err=>{document.getElementById('login-error').innerText=err.message;});
}

function logout(){
  auth.signOut();
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// Chart setup
let ctxKWH = document.getElementById('kwhChart').getContext('2d');
let kwhChart = new Chart(ctxKWH,{type:'line',data:{labels:[],datasets:[{label:'KWH',data:[],borderColor:'rgb(34,197,94)',backgroundColor:'rgba(34,197,94,0.2)',tension:0.3}]},options:{responsive:true,plugins:{legend:{display:true}},scales:{x:{title:{display:true,text:'Time'}},y:{title:{display:true,text:'KWH'},beginAtZero:true}}}});

// Realtime Data
function loadRealtimeData(){
  db.ref('realtime').on('value', snapshot=>{
    const d = snapshot.val();
    if(!d) return;
    document.getElementById('voltage').innerText=d.voltage.toFixed(1);
    document.getElementById('current').innerText=d.current.toFixed(2);
    document.getElementById('power').innerText=d.power.toFixed(1);
    document.getElementById('energy_total').innerText=d.energy_total.toFixed(2);
    document.getElementById('energy_used').innerText=d.energy_used.toFixed(2);
    document.getElementById('frequency').innerText=d.frequency.toFixed(1);
    document.getElementById('pf').innerText=d.pf.toFixed(2);
    document.getElementById('time').innerText=d.time;

    document.getElementById('biaya_per_jam').innerText=d.biaya_per_jam.toLocaleString();
    document.getElementById('biaya_per_hari').innerText=d.biaya_per_hari.toLocaleString();
    document.getElementById('biaya_per_bulan').innerText=d.biaya_per_bulan.toLocaleString();
    document.getElementById('biaya_total').innerText=d.biaya_total.toLocaleString();

    // Update chart
    if(kwhChart.data.labels.length>20){kwhChart.data.labels.shift();kwhChart.data.datasets[0].data.shift();}
    kwhChart.data.labels.push(d.time);
    kwhChart.data.datasets[0].data.push(d.energy_total);
    kwhChart.update();
  });
}

// Historical data
function loadHistoricalData(){
  const date = document.getElementById('datePicker').value;
  if(!date) return alert('Pilih tanggal!');
  db.ref('kwh/'+date).once('value', snapshot=>{
    const data = snapshot.val();
    if(!data) return alert('Data tidak ditemukan');
    kwhChart.data.labels=[]; kwhChart.data.datasets[0].data=[];
    Object.keys(data).forEach(t=>{
      kwhChart.data.labels.push(t);
      kwhChart.data.datasets[0].data.push(data[t].energy_total);
    });
    kwhChart.update();
  });
}

// Auth state
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadRealtimeData();
  }else{
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
  }
});
</script>

</body>
</html>
