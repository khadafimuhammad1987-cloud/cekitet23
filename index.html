<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Monitoring KWH</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Login Screen -->
<div id="login-screen" class="flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Login Dashboard</h2>
    <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
    <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
    <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Login</button>
    <p id="login-error" class="text-red-500 mt-2 text-sm"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Monitoring Listrik KWH</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
  </div>

  <!-- Tanggal & Grafik -->
  <div class="mb-6 flex gap-4 items-center">
    <label>Pilih Tanggal:</label>
    <input type="date" id="datePicker" class="p-2 border rounded">
    <button onclick="loadData()" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">Tampilkan</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Voltage (V)</h3>
      <p id="voltage">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Current (A)</h3>
      <p id="current">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Power (W)</h3>
      <p id="power">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Frequency (Hz)</h3>
      <p id="frequency">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Energy Total (kWh)</h3>
      <p id="energy_total">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Energy Used (kWh)</h3>
      <p id="energy_used">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Power Factor (PF)</h3>
      <p id="pf">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Time</h3>
      <p id="time">0</p>
    </div>
  </div>

  <!-- Biaya Listrik -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Biaya per Jam (Rp)</h3>
      <p id="biaya_per_jam">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Biaya per Hari (Rp)</h3>
      <p id="biaya_per_hari">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Biaya per Bulan (Rp)</h3>
      <p id="biaya_per_bulan">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h3 class="font-bold">Total Biaya (Rp)</h3>
      <p id="biaya_total">0</p>
    </div>
  </div>

  <!-- Grafik KWH -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <canvas id="kwhChart"></canvas>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
    authDomain: "rohmadafi.firebaseapp.com",
    databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rohmadafi",
    storageBucket: "rohmadafi.firebasestorage.app",
    messagingSenderId: "285538177933",
    appId: "1:285538177933:web:fcd8576153cfab9828a3c4"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        loadRealtimeData(); // Start realtime listener
      })
      .catch(err => {
        document.getElementById('login-error').innerText = err.message;
      });
  }

  function logout() {
    auth.signOut();
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
  }

  let ctx = document.getElementById('kwhChart').getContext('2d');
  let kwhChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'KWH', data: [], borderColor: 'rgb(34,197,94)', backgroundColor: 'rgba(34,197,94,0.2)', tension: 0.3 }] },
    options: { responsive: true, plugins: { legend: { display: true } }, scales: { x: { title: { display: true, text: 'Waktu' } }, y: { title: { display: true, text: 'KWH' }, beginAtZero: true } } }
  });

  function loadData() {
    const date = document.getElementById('datePicker').value;
    if(!date) return alert('Pilih tanggal terlebih dahulu!');
    db.ref('kwh/' + date).once('value', snapshot => {
      const data = snapshot.val();
      if(!data) return alert('Data tidak ditemukan untuk tanggal ini');
      let labels = [], values = [], totalKwh = 0;
      Object.keys(data).forEach(time => {
        labels.push(time);
        const kwh = parseFloat(data[time].energy_total.toFixed(2));
        values.push(kwh);
        totalKwh += kwh;
      });
      kwhChart.data.labels = labels;
      kwhChart.data.datasets[0].data = values;
      kwhChart.update();
    });
  }

  function loadRealtimeData() {
    db.ref('realtime').on('value', snapshot => {
      const data = snapshot.val();
      if(!data) return;
      document.getElementById('voltage').innerText = data.voltage.toFixed(1);
      document.getElementById('current').innerText = data.current.toFixed(2);
      document.getElementById('power').innerText = data.power.toFixed(1);
      document.getElementById('energy_total').innerText = data.energy_total.toFixed(2);
      document.getElementById('energy_used').innerText = data.energy_used.toFixed(2);
      document.getElementById('frequency').innerText = data.frequency.toFixed(1);
      document.getElementById('pf').innerText = data.pf.toFixed(2);
      document.getElementById('time').innerText = data.time;

      document.getElementById('biaya_per_jam').innerText = data.biaya_per_jam.toLocaleString();
      document.getElementById('biaya_per_hari').innerText = data.biaya_per_hari.toLocaleString();
      document.getElementById('biaya_per_bulan').innerText = data.biaya_per_bulan.toLocaleString();
      document.getElementById('biaya_total').innerText = data.biaya_total.toLocaleString();
    });
  }

  auth.onAuthStateChanged(user => {
    if(user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadRealtimeData();
    } else {
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
    }
  });
</script>

</body>
</html>
