<!DOCTYPE html>
<html>
<head>
<title>Smart Energy Monitor</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:15px;
display:inline-block;
width:200px;
}

.value{
font-size:28px;
font-weight:bold;
}

.loginBox{
margin-top:100px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

</style>
</head>

<body>

<div id="loginPage" class="loginBox">

<h2>Login Energy Monitor</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>


<div id="dashboard" style="display:none">

<h1>⚡ Smart Energy Monitor</h1>

<div class="container">

<div class="card">
Voltage
<div id="voltage" class="value">0</div>
</div>

<div class="card">
Current
<div id="current" class="value">0</div>
</div>

<div class="card">
Power
<div id="power" class="value">0</div>
</div>

<div class="card">
Energy
<div id="energy" class="value">0</div>
</div>

<div class="card">
Daily Cost
<div id="dailyCost" class="value">Rp 0</div>
</div>

<div class="card">
Monthly Cost
<div id="monthlyCost" class="value">Rp 0</div>
</div>

</div>

<br><br>

<h2>Power Usage Graph</h2>

<canvas id="powerChart"></canvas>

<br>

<button onclick="exportCSV()">Export CSV</button>

</div>


<script>

// FIREBASE CONFIG ANDA
const firebaseConfig = {
apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


// LOGIN

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

startMonitoring()

})

.catch(e=>alert(e.message))

}



// CHART

let ctx=document.getElementById("powerChart").getContext("2d")

let powerChart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Power (W)',
data:[],
borderColor:'yellow',
backgroundColor:'rgba(255,255,0,0.2)'
}]
}
})



// MONITORING REALTIME

function startMonitoring(){

db.ref("monitoring").on("value",snapshot=>{

let data=snapshot.val()

if(!data) return

document.getElementById("voltage").innerText=data.voltage+" V"
document.getElementById("current").innerText=data.current+" A"
document.getElementById("power").innerText=data.power+" W"
document.getElementById("energy").innerText=data.energy+" kWh"

updateChart(data.power)

calculateCost(data.energy)

})

}



// UPDATE CHART

function updateChart(power){

let time=new Date().toLocaleTimeString()

powerChart.data.labels.push(time)
powerChart.data.datasets[0].data.push(power)

if(powerChart.data.labels.length>20){

powerChart.data.labels.shift()
powerChart.data.datasets[0].data.shift()

}

powerChart.update()

}



// HITUNG BIAYA LISTRIK
// Tarif 1300VA ≈ Rp 1444 / kWh

function calculateCost(energy){

let tariff=1444

let cost=energy*tariff

document.getElementById("dailyCost").innerText="Rp "+cost.toFixed(0)

document.getElementById("monthlyCost").innerText="Rp "+(cost*30).toFixed(0)

}



// EXPORT CSV

function exportCSV(){

let rows=[["Time","Power"]]

powerChart.data.labels.forEach((t,i)=>{

rows.push([t,powerChart.data.datasets[0].data[i]])

})

let csv=rows.map(e=>e.join(",")).join("\n")

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="energy.csv"

a.click()

}

</script>

</body>
</html>
