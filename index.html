<!DOCTYPE html>
<html>

<head>

<title>Smart Energy Monitoring</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* LOGIN */

.login{
width:320px;
margin:auto;
margin-top:120px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#00d4ff;
color:black;
font-size:16px;
cursor:pointer;
}

/* DASHBOARD */

.dashboard{
display:none;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
text-align:center;
}

.value{
font-size:26px;
color:#00eaff;
margin-top:10px;
}

/* PUMP */

.pump{
margin-top:30px;
text-align:center;
}

.pumpIcon{
position:relative;
display:inline-block;
}

.pumpIcon img{
width:110px;
}

.water{
position:absolute;
bottom:-20px;
left:50%;
transform:translateX(-50%);
width:12px;
height:0;
background:#00eaff;
border-radius:10px;
}

.on .water{
height:80px;
animation:flow 0.5s infinite alternate;
}

.off .water{
height:0;
}

@keyframes flow{
0%{transform:translateX(-50%) scaleY(1)}
100%{transform:translateX(-50%) scaleY(1.2)}
}

/* CHART */

.chart{
margin-top:30px;
background:white;
border-radius:10px;
padding:20px;
}

/* HISTORY */

.history{
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<header>⚡ Smart Energy Monitoring</header>

<div class="login" id="login">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<div class="dashboard" id="dashboard">

<div class="grid">

<div class="card">Voltage<div class="value" id="voltage">0</div></div>
<div class="card">Current<div class="value" id="current">0</div></div>
<div class="card">Power<div class="value" id="power">0</div></div>
<div class="card">Energy<div class="value" id="energy">0</div></div>
<div class="card">Frequency<div class="value" id="freq">0</div></div>
<div class="card">Power Factor<div class="value" id="pf">0</div></div>
<div class="card">Tarif PLN<div class="value" id="tarif">0</div></div>
<div class="card">Estimasi Biaya<div class="value" id="biayaTotal">0</div></div>

</div>

<div class="pump off" id="pumpBox">

<h3>Pompa Air</h3>

<div class="pumpIcon">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966489.png">

<div class="water"></div>

</div>

<br><br>

<button onclick="togglePump()">ON / OFF</button>

</div>

<div class="history">

<h3>History Berdasarkan Tanggal</h3>

<input type="date" id="tanggal">

<button onclick="loadHistory()">Tampilkan</button>

</div>

<div class="chart">

<canvas id="chart"></canvas>

</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain:"rohmadafi.firebaseapp.com",
databaseURL:"https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"rohmadafi",
storageBucket:"rohmadafi.firebasestorage.app",
messagingSenderId:"285538177933",
appId:"1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

/* TARIF PLN */

let tarifKwh=1444.7

/* FORMAT RUPIAH */

function rupiah(n){

return new Intl.NumberFormat("id-ID",{
style:"currency",
currency:"IDR",
maximumFractionDigits:0
}).format(n)

}

/* LOGIN */

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

startMonitor()

})

.catch(err=>alert(err.message))

}

/* CHART */

let ctx=document.getElementById("chart").getContext("2d")

let chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Power (W)",
data:[],
borderColor:"#00eaff",
backgroundColor:"rgba(0,234,255,0.2)",
fill:true,
tension:0.4
}]
}
})

/* MONITOR DATA */

function startMonitor(){

db.ref("monitoring/live").on("value",snap=>{

let d=snap.val()

document.getElementById("voltage").innerHTML=parseFloat(d.voltage).toFixed(1)+" V"
document.getElementById("current").innerHTML=parseFloat(d.current).toFixed(1)+" A"
document.getElementById("power").innerHTML=parseFloat(d.power).toFixed(1)+" W"
document.getElementById("energy").innerHTML=parseFloat(d.energy_total).toFixed(1)+" kWh"

document.getElementById("freq").innerHTML=parseFloat(d.frequency).toFixed(1)+" Hz"
document.getElementById("pf").innerHTML=parseFloat(d.pf).toFixed(1)

document.getElementById("tarif").innerHTML=rupiah(tarifKwh)+"/kWh"

let biaya=d.energy_total*tarifKwh

document.getElementById("biayaTotal").innerHTML=rupiah(biaya)

updateChart(d.power)

})

/* STATUS POMPA */

db.ref("monitoring/control/pompa").on("value",snap=>{

let state=snap.val()

let box=document.getElementById("pumpBox")

if(state){

box.classList.remove("off")
box.classList.add("on")

}else{

box.classList.remove("on")
box.classList.add("off")

}

})

}

/* CONTROL POMPA */

function togglePump(){

let ref=db.ref("monitoring/control/pompa")

ref.once("value").then(snap=>{

ref.set(!snap.val())

})

}

/* UPDATE CHART */

function updateChart(power){

let t=new Date().toLocaleTimeString()

chart.data.labels.push(t)
chart.data.datasets[0].data.push(power)

if(chart.data.labels.length>25){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

}

/* HISTORY */

function loadHistory(){

let tanggal=document.getElementById("tanggal").value

chart.data.labels=[]
chart.data.datasets[0].data=[]

db.ref("monitoring/history").once("value",snap=>{

snap.forEach(child=>{

let d=child.val()

let t=tanggal.split("-").reverse().join("-")

if(d.time.includes(t)){

updateChart(d.power)

}

})

})

}

</script>

</body>
</html>
