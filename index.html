<!DOCTYPE html>
<html>
<head>

<title>PLN Energy Monitor</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef3ff;
margin:0;
}

.header{
background:linear-gradient(90deg,#004aad,#00a2ff);
color:white;
padding:20px;
font-size:25px;
}

.login{
width:300px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.dashboard{
display:none;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:inline-block;
width:200px;
text-align:center;
font-size:20px;
}

.chart{
width:90%;
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
⚡ PLN Energy Monitoring
</div>

<div class="login" id="login">

<h3>Login</h3>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<div class="dashboard" id="dashboard">

<div class="card">Voltage<br><b id="voltage">0</b> V</div>
<div class="card">Current<br><b id="current">0</b> A</div>
<div class="card">Power<br><b id="power">0</b> W</div>
<div class="card">Energy<br><b id="energy">0</b> kWh</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

loadData()

})

}

let chart = new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:[],
datasets:[{
label:"Power",
data:[],
borderColor:"blue"
}]
}
})

function loadData(){

db.ref("monitoring").on("value",(snapshot)=>{

let data=snapshot.val()

document.getElementById("voltage").innerHTML=data.voltage.toFixed(1)
document.getElementById("current").innerHTML=data.current.toFixed(1)
document.getElementById("power").innerHTML=data.power.toFixed(1)
document.getElementById("energy").innerHTML=data.energy.toFixed(1)

chart.data.labels.push("")
chart.data.datasets[0].data.push(data.power)

if(chart.data.labels.length>20){
chart.data.labels.shift()
chart.data.datasets[0].data.shift()
}

chart.update()

})

}

</script>

</body>
</html>
