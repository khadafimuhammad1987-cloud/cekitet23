<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PLN Smart Energy Monitor</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#005bea,#00c6fb);
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
color:#333;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

.value{
font-size:28px;
font-weight:bold;
color:#0077ff;
}

.section{
background:white;
color:#333;
margin-top:20px;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005ad6;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0077ff;
color:white;
padding:8px;
}

table td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:center;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>⚡ PLN Energy Monitoring</h1>

<div class="section">

<h3>Login</h3>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div class="dashboard">

<div class="card">
Voltage
<div class="value" id="voltage">0</div>
</div>

<div class="card">
Current
<div class="value" id="current">0</div>
</div>

<div class="card">
Power
<div class="value" id="power">0</div>
</div>

<div class="card">
Energy
<div class="value" id="energy">0</div>
</div>

</div>

<div class="section">

<h3>Grafik Daya Realtime</h3>

<canvas id="powerChart"></canvas>

</div>

<div class="section">

<h3>Konsumsi Harian</h3>

<input type="date" id="tanggal">

<button onclick="hitungHarian()">Tampilkan</button>

<p>Energi : <b id="energyDay">0</b> kWh</p>

<p>Biaya : Rp <b id="costDay">0</b></p>

</div>

<div class="section">

<h3>Konsumsi Bulanan</h3>

<p>Energi bulan ini : <b id="energyMonth">0</b> kWh</p>

<p>Biaya bulan ini : Rp <b id="costMonth">0</b></p>

</div>

<div class="section">

<h3>Riwayat Konsumsi</h3>

<table>

<tr>
<th>Waktu</th>
<th>Voltage</th>
<th>Current</th>
<th>Power</th>
<th>Energy</th>
</tr>

<tbody id="history"></tbody>

</table>

</div>

<div class="section">

<button onclick="exportCSV()">Export CSV</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"

};

firebase.initializeApp(firebaseConfig);

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

firebase.auth().signInWithEmailAndPassword(email,pass)

}

let chart=new Chart(
document.getElementById("powerChart"),
{
type:'line',
data:{
labels:[],
datasets:[{
label:'Power (W)',
data:[],
borderColor:'#0077ff',
backgroundColor:'rgba(0,119,255,0.2)',
fill:true
}]
}
})

firebase.database().ref("monitoring/live").on("value",(snap)=>{

let d=snap.val()

document.getElementById("voltage").innerText=d.voltage+" V"
document.getElementById("current").innerText=d.current+" A"
document.getElementById("power").innerText=d.power+" W"
document.getElementById("energy").innerText=d.energy+" kWh"

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(d.power)

if(chart.data.labels.length>20){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

})

function hitungHarian(){

let tanggal=document.getElementById("tanggal").value
let tarif=1444.7
let total=0

firebase.database().ref("monitoring/history").once("value",(snap)=>{

snap.forEach((child)=>{

let d=child.val()
let waktu=new Date(d.timestamp)

if(waktu.toISOString().slice(0,10)==tanggal){

total+=d.energy

}

})

document.getElementById("energyDay").innerText=total.toFixed(2)
document.getElementById("costDay").innerText=(total*tarif).toFixed(0)

})

}

function hitungBulanan(){

let now=new Date()
let tarif=1444.7
let total=0

firebase.database().ref("monitoring/history").once("value",(snap)=>{

snap.forEach((child)=>{

let d=child.val()
let waktu=new Date(d.timestamp)

if(waktu.getMonth()==now.getMonth()){

total+=d.energy

}

})

document.getElementById("energyMonth").innerText=total.toFixed(2)
document.getElementById("costMonth").innerText=(total*tarif).toFixed(0)

})

}

setInterval(hitungBulanan,5000)

function loadHistory(){

firebase.database().ref("monitoring/history")
.limitToLast(20)
.once("value",(snap)=>{

let table=""

snap.forEach((child)=>{

let d=child.val()

table+=`
<tr>
<td>${new Date(d.timestamp).toLocaleString()}</td>
<td>${d.voltage}</td>
<td>${d.current}</td>
<td>${d.power}</td>
<td>${d.energy}</td>
</tr>
`

})

document.getElementById("history").innerHTML=table

})

}

setInterval(loadHistory,5000)

function exportCSV(){

firebase.database().ref("monitoring/history").once("value",(snap)=>{

let csv="voltage,current,power,energy\n"

snap.forEach((child)=>{

let d=child.val()

csv+=`${d.voltage},${d.current},${d.power},${d.energy}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="data_listrik.csv"

a.click()

})

}

</script>

</body>
</html>
