<!DOCTYPE html>
<html>
<head>
<title>Smart Energy Monitor</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

.container{
width:95%;
margin:auto;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:15px;
width:180px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h3{
margin:0;
font-size:18px;
color:#94a3b8;
}

.value{
font-size:32px;
font-weight:bold;
margin-top:10px;
color:#38bdf8;
}

.cost{
color:#22c55e;
}

.loginBox{
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
}

.chartBox{
width:90%;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

</style>
</head>

<body>

<div id="loginPage" class="loginBox">

<h2>⚡ Login Energy Monitor</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>


<div id="dashboard" style="display:none">

<h1>⚡ Smart Energy Monitor</h1>

<div class="cards">

<div class="card">
<h3>Voltage</h3>
<div id="voltage" class="value">0.0</div>
</div>

<div class="card">
<h3>Current</h3>
<div id="current" class="value">0.0</div>
</div>

<div class="card">
<h3>Power</h3>
<div id="power" class="value">0.0</div>
</div>

<div class="card">
<h3>Energy</h3>
<div id="energy" class="value">0.0</div>
</div>

<div class="card">
<h3>Daily Cost</h3>
<div id="dailyCost" class="value cost">Rp 0</div>
</div>

<div class="card">
<h3>Monthly Cost</h3>
<div id="monthlyCost" class="value cost">Rp 0</div>
</div>

</div>

<br>

<h2>📊 Grafik Konsumsi Listrik</h2>

<div class="chartBox">
<canvas id="powerChart"></canvas>
</div>

<br>

<h3>📅 Pilih Tanggal</h3>

<input type="date" id="datePicker" onchange="loadHistory()">

<br><br>

<button onclick="exportCSV()">Export CSV</button>

</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();


// LOGIN

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

startMonitoring()

})

.catch(e=>alert(e.message))

}


// CHART

let ctx=document.getElementById("powerChart").getContext("2d")

let chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:"Power (W)",
data:[],
borderColor:"#facc15",
backgroundColor:"rgba(250,204,21,0.2)",
tension:0.3
}]
}
})



// MONITORING REALTIME

function startMonitoring(){

db.ref("monitoring").on("value",snap=>{

let d=snap.val()

if(!d) return

document.getElementById("voltage").innerText=parseFloat(d.voltage).toFixed(1)+" V"
document.getElementById("current").innerText=parseFloat(d.current).toFixed(1)+" A"
document.getElementById("power").innerText=parseFloat(d.power).toFixed(1)+" W"
document.getElementById("energy").innerText=parseFloat(d.energy).toFixed(1)+" kWh"

updateChart(d.power)

calculateCost(d.energy)

})

}



// UPDATE CHART

function updateChart(power){

let time=new Date().toLocaleTimeString()

chart.data.labels.push(time)
chart.data.datasets[0].data.push(power)

if(chart.data.labels.length>30){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

}



// BIAYA LISTRIK 1300VA

function calculateCost(energy){

let tarif=1444

let daily=energy*tarif

let monthly=daily*30

document.getElementById("dailyCost").innerText="Rp "+daily.toFixed(0)
document.getElementById("monthlyCost").innerText="Rp "+monthly.toFixed(0)

}



// LOAD HISTORY BERDASARKAN TANGGAL

function loadHistory(){

let date=document.getElementById("datePicker").value

db.ref("history/"+date).once("value",snap=>{

let data=snap.val()

if(!data){
alert("Data tidak ada")
return
}

alert(
"Energy : "+data.energy+" kWh\n"+
"Cost : Rp "+data.cost
)

})

}



// EXPORT CSV

function exportCSV(){

let rows=[["Time","Power"]]

chart.data.labels.forEach((t,i)=>{

rows.push([t,chart.data.datasets[0].data[i]])

})

let csv=rows.map(e=>e.join(",")).join("\n")

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="energy.csv"

a.click()

}

</script>

</body>
</html>
