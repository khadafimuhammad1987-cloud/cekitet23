<!DOCTYPE html>
<html>

<head>

<title>Monitoring Listrik 1300VA</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>LOGIN</h2>

<input id="email" placeholder="email">
<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<h2>Realtime Monitoring</h2>

Voltage : <span id="voltage"></span> V<br>
Current : <span id="current"></span> A<br>
Power : <span id="power"></span> W<br>
Energy : <span id="energy"></span> kWh<br>

<h3>Status Daya</h3>

<span id="status"></span>

<hr>

<h2>Grafik Daya</h2>

<canvas id="chart"></canvas>

<hr>

<h2>Perhitungan Energi & Biaya</h2>

Tarif listrik : Rp1444.7 / kWh

<h3>Energi Hari Ini</h3>

<span id="energy_today">0</span> kWh

<h3>Biaya Hari Ini</h3>

Rp <span id="cost_today">0</span>

<h3>Energi Bulan Ini</h3>

<span id="energy_month">0</span> kWh

<h3>Biaya Bulan Ini</h3>

Rp <span id="cost_month">0</span>

<br><br>

<button onclick="exportCSV()">Export CSV</button>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
authDomain: "rohmadafi.firebaseapp.com",
databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rohmadafi",
storageBucket: "rohmadafi.firebasestorage.app",
messagingSenderId: "285538177933",
appId: "1:285538177933:web:e1f732b60209da0e28a3c4"

};

firebase.initializeApp(firebaseConfig);

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

firebase.auth().signInWithEmailAndPassword(email,pass)

}

let ctx=document.getElementById("chart").getContext("2d")

let chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Power (W)',
data:[]
}]
}
})

firebase.database().ref("monitoring/live").on("value",(snap)=>{

let d=snap.val()

document.getElementById("voltage").innerText=d.voltage
document.getElementById("current").innerText=d.current
document.getElementById("power").innerText=d.power
document.getElementById("energy").innerText=d.energy

if(d.power>1300)
document.getElementById("status").innerText="⚠ Melebihi daya 1300VA"
else
document.getElementById("status").innerText="Normal"

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(d.power)

chart.update()

})

function hitungBiaya(){

let tarif=1444.7

firebase.database().ref("monitoring/history").once("value",(snap)=>{

let todayEnergy=0
let monthEnergy=0

let now=new Date()

snap.forEach((child)=>{

let d=child.val()

let waktu=new Date(d.timestamp)

if(waktu.toDateString()==now.toDateString())
todayEnergy+=d.energy

if(waktu.getMonth()==now.getMonth())
monthEnergy+=d.energy

})

document.getElementById("energy_today").innerText=todayEnergy.toFixed(2)
document.getElementById("energy_month").innerText=monthEnergy.toFixed(2)

document.getElementById("cost_today").innerText=(todayEnergy*tarif).toFixed(0)
document.getElementById("cost_month").innerText=(monthEnergy*tarif).toFixed(0)

})

}

setInterval(hitungBiaya,5000)

function exportCSV(){

firebase.database().ref("monitoring/history").once("value",(snap)=>{

let csv="voltage,current,power,energy\n"

snap.forEach((child)=>{

let d=child.val()

csv+=`${d.voltage},${d.current},${d.power},${d.energy}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="data_listrik.csv"

a.click()

})

}

</script>

</body>

</html>
