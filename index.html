<!DOCTYPE html>
<html>
<head>
<title>Monitoring Energi</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.card{
display:inline-block;
width:150px;
margin:10px;
padding:15px;
background:white;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.value{
font-size:22px;
font-weight:bold;
color:#2196F3;
}

#login{
margin-top:50px;
}

</style>
</head>

<body>

<h2>Monitoring Energi PZEM</h2>

<div id="login">

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<h3>Live Monitoring</h3>

<div class="card">
Voltage
<div id="voltage" class="value">0</div>
</div>

<div class="card">
Current
<div id="current" class="value">0</div>
</div>

<div class="card">
Power
<div id="power" class="value">0</div>
</div>

<div class="card">
Energy
<div id="energy" class="value">0</div>
</div>

<div class="card">
Frequency
<div id="frequency" class="value">0</div>
</div>

<div class="card">
PF
<div id="pf" class="value">0</div>
</div>

</div>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
  authDomain: "rohmadafi.firebaseapp.com",
  databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rohmadafi",
  storageBucket: "rohmadafi.firebasestorage.app",
  messagingSenderId: "285538177933",
  appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

loadData();

})
.catch((error)=>{
alert(error.message);
});

}

function loadData(){

const ref = db.ref("monitoring/live");

ref.on("value",(snapshot)=>{

let data = snapshot.val();

document.getElementById("voltage").innerText = data.voltage;
document.getElementById("current").innerText = data.current;
document.getElementById("power").innerText = data.power;
document.getElementById("energy").innerText = data.energy;
document.getElementById("frequency").innerText = data.frequency;
document.getElementById("pf").innerText = data.pf;

});

}

</script>

</body>
</html>
